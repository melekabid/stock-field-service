databases:
  - name: stock-field-postgres
    plan: free
    databaseName: stock_field_service
    user: stock_field_service

services:
  - type: web
    name: stock-field-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: sh scripts/render-build.sh
    startCommand: sh scripts/render-start.sh
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: stock-field-postgres
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: UPLOAD_DIR
        value: uploads
      - key: COMPANY_NAME
        value: SACOGES Commerce et Service
      - key: COMPANY_LOGO_URL
        sync: false
      - key: APP_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: API_URL
        sync: false
